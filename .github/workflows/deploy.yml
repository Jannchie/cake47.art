name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_WORKER_NAME: cake47-art
      NUXT_HUB_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NUXT_HUB_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      NUXT_HUB_CLOUDFLARE_DATABASE_ID: ${{ secrets.NUXT_HUB_CLOUDFLARE_DATABASE_ID }}
      NUXT_HUB_CLOUDFLARE_R2_BUCKET: ${{ secrets.NUXT_HUB_CLOUDFLARE_R2_BUCKET }}
      NUXT_ADMIN_TOKEN: ${{ secrets.NUXT_ADMIN_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate deployment secrets
        run: |
          : "${CLOUDFLARE_ACCOUNT_ID:?Missing CLOUDFLARE_ACCOUNT_ID}"
          : "${CLOUDFLARE_API_TOKEN:?Missing CLOUDFLARE_API_TOKEN}"
          : "${NUXT_HUB_CLOUDFLARE_DATABASE_ID:?Missing NUXT_HUB_CLOUDFLARE_DATABASE_ID}"
          : "${NUXT_HUB_CLOUDFLARE_R2_BUCKET:?Missing NUXT_HUB_CLOUDFLARE_R2_BUCKET}"
          : "${NUXT_ADMIN_TOKEN:?Missing NUXT_ADMIN_TOKEN}"

      - name: Apply D1 migrations
        run: pnpm db:migrate:production

      - name: Deploy Worker
        run: pnpm deploy:cloudflare

      - name: Sync Worker secrets
        run: printf '%s' "$NUXT_ADMIN_TOKEN" | pnpm exec wrangler secret put NUXT_ADMIN_TOKEN --config .output/server/wrangler.json
